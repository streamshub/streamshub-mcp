# =============================================================================
# MCP Server Configuration
# =============================================================================
quarkus.mcp.server.server-info.name=strimzi-mcp
quarkus.mcp.server.server-info.version=1.0.0
quarkus.mcp.server.server-info.instructions=Use the available Strimzi MCP tools \
  when answering questions about Kafka clusters, topics, node pools, or Strimzi operators on Kubernetes. \
  The namespace parameter is optional - omit it to search across all namespaces.

quarkus.http.cors.enabled=true
# Default: localhost origins (covers MCP clients like Claude Desktop, IDE plugins)
# Override with QUARKUS_HTTP_CORS_ORIGINS env var for production deployments
quarkus.http.cors.origins=http://localhost:*,https://localhost:*
quarkus.http.cors.methods=GET,POST,OPTIONS
quarkus.http.cors.headers=Accept,Content-Type,Mcp-Session-Id

# Dev profile: permissive CORS for testing
%dev.quarkus.http.cors.origins=/.*/

# Kubernetes Configuration
quarkus.kubernetes-client.trust-certs=true

# Application Configuration
quarkus.http.port=8080

# =============================================================================
# Log Configuration
# =============================================================================
# Log provider: "streamshub-kubernetes" (default, reads pod logs via K8s API)
#               or "streamshub-loki" (queries a Loki instance)
mcp.log.provider=streamshub-kubernetes
mcp.log.tail-lines=200

# Loki config (only when provider=loki)
quarkus.rest-client.loki.url=http://localhost:3100
quarkus.rest-client.loki.scope=jakarta.inject.Singleton
#quarkus.tls.trust-all=true
mcp.log.loki.auth-mode=none
mcp.log.loki.sa-token-path=/var/run/secrets/kubernetes.io/serviceaccount/token

# Loki label mapping (defaults: namespace/pod — matches Promtail/Alloy)
# For OpenShift Logging (ClusterLogForwarder), use:
#   mcp.log.loki.label.namespace=kubernetes_namespace_name
#   mcp.log.loki.label.pod=kubernetes_pod_name

# Basic auth (when auth-mode=basic)
# quarkus.rest-client.loki.username=
# quarkus.rest-client.loki.password=

# Loki TLS (uncomment and configure when Loki uses TLS)
# On Kubernetes: mount certs from Secret, set these via env vars or ConfigMap
# quarkus.rest-client.loki.trust-store=/etc/loki-tls/ca.crt
# quarkus.rest-client.loki.trust-store-type=PEM
# mTLS client certificate (when Loki requires client cert auth)
# quarkus.rest-client.loki.key-store=/etc/loki-tls/client.p12
# quarkus.rest-client.loki.key-store-password=changeit
# quarkus.rest-client.loki.key-store-type=PKCS12

# =============================================================================
# Metrics Configuration
# =============================================================================
# Metrics provider: "pod-scraping" or "streamshub-prometheus"
mcp.metrics.provider=streamshub-pod-scraping
mcp.metrics.default-step-seconds=60
# Max time range for metrics queries in minutes (default: 10080 = 7 days)
# mcp.metrics.max-range-minutes=10080

# Prometheus config (only when provider=prometheus)
quarkus.rest-client.prometheus.url=http://localhost:9090
quarkus.rest-client.prometheus.scope=jakarta.inject.Singleton
mcp.metrics.prometheus.auth-mode=none
mcp.metrics.prometheus.sa-token-path=/var/run/secrets/kubernetes.io/serviceaccount/token

# Basic auth (when auth-mode=basic)
# quarkus.rest-client.prometheus.username=
# quarkus.rest-client.prometheus.password=

# Prometheus TLS (uncomment and configure when Prometheus uses TLS)
# On Kubernetes: mount certs from Secret, set these via env vars or ConfigMap
# quarkus.rest-client.prometheus.trust-store=/etc/prometheus-tls/ca.crt
# quarkus.rest-client.prometheus.trust-store-type=PEM
# mTLS client certificate (when Prometheus requires client cert auth)
# quarkus.rest-client.prometheus.key-store=/etc/prometheus-tls/client.p12
# quarkus.rest-client.prometheus.key-store-password=changeit
# quarkus.rest-client.prometheus.key-store-type=PKCS12
# quarkus.rest-client.prometheus.verify-host=true

# OAuth2/OIDC: not yet supported — planned for future release

# =============================================================================
# Guardrail Configuration
# =============================================================================
# Log redaction: automatically redacts sensitive patterns in tool responses
# mcp.guardrail.log-redaction.enabled=true
#
# Custom redaction patterns (regex, indexed — appended after built-in rules):
# mcp.guardrail.log-redaction.custom-patterns[0]=(?i)ssn\\s*[=:]\\s*\\d{3}-\\d{2}-\\d{4}
# mcp.guardrail.log-redaction.custom-patterns[1]=(?i)x-custom-header:\\s*\\S+
# Environment variable equivalent:
#   MCP_GUARDRAIL_LOG_REDACTION_CUSTOM_PATTERNS_0=(?i)ssn\\s*[=:]\\s*\\d{3}-\\d{2}-\\d{4}
#
# Max response size in bytes (truncates largest text fields when exceeded)
# mcp.guardrail.max-response-bytes=500000

# =============================================================================
# Sampling Configuration (LLM-powered diagnostic analysis)
# =============================================================================
# Max tokens for triage requests (decides which areas to investigate)
# Max related resources (pods, PVCs) to query events for per cluster (default: 50)
# mcp.events.max-related-resources=50
# Completion cache TTL in seconds (default: 5)
# mcp.completion.cache-ttl-seconds=5

mcp.sampling.triage-max-tokens=200
# Max tokens for analysis requests (produces root cause analysis)
mcp.sampling.analysis-max-tokens=1500

# Logging Configuration
%dev.quarkus.log.category."io.streamshub.mcp".level=DEBUG
quarkus.log.category."io.quarkiverse.mcp".level=INFO
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n

# Development Configuration

# Reduce dev mode noise
%dev.quarkus.log.category."io.quarkus.deployment.dev.DevModeCommandLineBuilder".level=WARN

# =============================================================================
# Native Image Configuration
# =============================================================================

# Native container build - use UBI 8 Mandrel to match runtime base image
quarkus.native.builder-image=quay.io/quarkus/ubi-quarkus-mandrel-builder-image:jdk-21

# =============================================================================
# Container Image Configuration
# =============================================================================
quarkus.container-image.group=streamshub
quarkus.container-image.name=strimzi-mcp
quarkus.container-image.tag=${quarkus.application.version:latest}
quarkus.container-image.registry=quay.io

# Multi-arch build (amd64 + arm64)
quarkus.jib.platforms=linux/amd64,linux/arm64

# Native container image base (smaller than JVM image)
quarkus.jib.base-native-image=quay.io/quarkus/quarkus-micro-image:2.0

# Native image build optimizations
quarkus.native.resources.includes=META-INF/services/**
