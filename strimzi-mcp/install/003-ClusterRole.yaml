apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: streamshub-strimzi-mcp
  labels:
    app: streamshub-strimzi-mcp
rules:
  # Strimzi custom resources
  - apiGroups: ["kafka.strimzi.io"]
    resources:
      - kafkas
      - kafkanodepools
      - kafkatopics
    verbs: ["get", "list", "watch"]
  - apiGroups: ["core.strimzi.io"]
    resources:
      - strimzipodsets
    verbs: ["get", "list", "watch"]
  # Strimzi operator deployments
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
  # Pods and services
  - apiGroups: [""]
    resources: ["pods", "services"]
    verbs: ["get", "list"]
  # Pod logs (get only, no list)
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  # Events (list only, used with field selectors)
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["list"]
  # ConfigMaps (logging overrides, external configuration references)
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
  # Routes (OpenShift)
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    verbs: ["get", "list"]
  # Ingresses
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list"]
  # Leases (operator leader election status)
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list"]
