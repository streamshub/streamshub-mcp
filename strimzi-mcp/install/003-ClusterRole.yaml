apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: streamshub-strimzi-mcp
  labels:
    app: streamshub-strimzi-mcp
rules:
  # Strimzi custom resources
  - apiGroups: ["kafka.strimzi.io"]
    resources:
      - kafkas
      - kafkanodepools
      - kafkatopics
      - kafkausers
      - kafkaconnects
      - kafkaconnectors
      - kafkabridges
      - kafkarebalances
      - kafkamirrormaker2s
    verbs: ["get", "list", "watch"]
  - apiGroups: ["core.strimzi.io"]
    resources:
      - strimzipodsets
    verbs: ["get", "list", "watch"]
  # Strimzi operator deployments (watched for resource subscriptions)
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
  # Pods, logs, and services
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "secrets", "configmaps"]
    verbs: ["get", "list"]
  # Routes (OpenShift)
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    verbs: ["get", "list"]
  # Ingresses
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list"]
  # Leases
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list"]
