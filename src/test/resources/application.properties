# Test configuration - disable LLM dependencies for CI/CD
quarkus.langchain4j.chat-model.provider=ollama
quarkus.langchain4j.ollama.base-url=http://localhost:11434
quarkus.langchain4j.ollama.chat-model.model-id=llama3.2:3b

# Disable automatic bean creation for tests
quarkus.arc.remove-unused-beans=false

# Mock Kubernetes client for tests
quarkus.kubernetes-client.trust-certs=true
quarkus.kubernetes-client.namespace=test