# LLM Provider Configuration (configurable: openai or ollama)
app.llm.provider=${LLM_PROVIDER:ollama}
%dev.quarkus.langchain4j.chat-model.provider=ollama
%prod.quarkus.langchain4j.chat-model.provider=ollama

# OpenAI Configuration (when provider=openai)
quarkus.langchain4j.openai.api-key=${OPENAI_API_KEY:not-set}
quarkus.langchain4j.openai.chat-model.model-name=gpt-4
quarkus.langchain4j.openai.chat-model.temperature=0.7
quarkus.langchain4j.openai.timeout=60s

# Ollama Configuration (when provider=ollama)
quarkus.langchain4j.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
quarkus.langchain4j.ollama.chat-model.model-name=${OLLAMA_MODEL:llama3.2:3b}
quarkus.langchain4j.ollama.timeout=120s

# MCP Server Configuration
quarkus.mcp.server.http.path=/mcp
quarkus.mcp.server.http.cors.origins=*

# Kubernetes Configuration
quarkus.kubernetes-client.trust-certs=true
quarkus.kubernetes-client.namespace=${K8S_NAMESPACE:default}

# Application Configuration
quarkus.http.port=8080

# CLI Configuration
quarkus.picocli.native-image.processing.enable=true

# Logging Configuration
quarkus.log.category."io.strimzi.mcp".level=DEBUG
quarkus.log.category."dev.langchain4j".level=INFO
quarkus.log.console.enable=true
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n

# Development Configuration
%dev.quarkus.langchain4j.openai.log-requests=true
%dev.quarkus.langchain4j.openai.log-responses=true
%dev.quarkus.langchain4j.ollama.log-requests=true
%dev.quarkus.langchain4j.ollama.log-responses=true