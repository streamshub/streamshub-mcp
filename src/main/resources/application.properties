# =============================================================================
# MCP Server Configuration
# =============================================================================
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=/.*/
quarkus.http.cors.methods=GET,POST,OPTIONS
quarkus.http.cors.headers=Accept,Content-Type,Mcp-Session-Id

# Kubernetes Configuration
quarkus.kubernetes-client.trust-certs=true
quarkus.kubernetes-client.namespace=${K8S_NAMESPACE:kafka}

# Application Configuration
quarkus.http.port=8080

# Logging Configuration
quarkus.log.category."io.streamshub.mcp".level=DEBUG
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n

# Development Configuration

# Reduce dev mode noise
%dev.quarkus.log.category."io.quarkus.deployment.dev.DevModeCommandLineBuilder".level=WARN

# =============================================================================
# Native Image Configuration
# =============================================================================

# Native container build - use UBI 8 Mandrel to match runtime base image
quarkus.native.builder-image=quay.io/quarkus/ubi-quarkus-mandrel-builder-image:jdk-21

# Native container image base (smaller than JVM image)
quarkus.jib.base-native-image=quay.io/quarkus/quarkus-micro-image:2.0

# Native image build optimizations
quarkus.native.resources.includes=META-INF/services/**