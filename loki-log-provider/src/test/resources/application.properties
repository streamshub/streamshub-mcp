# Test configuration for Loki log provider
mcp.log.provider=streamshub-loki
mcp.log.loki.label.namespace=namespace
mcp.log.loki.label.pod=pod

# Loki REST client (Quarkus-managed)
quarkus.rest-client.loki.url=http://localhost:3100
quarkus.rest-client.loki.scope=jakarta.inject.Singleton

# Disable Kubernetes client in tests
quarkus.kubernetes-client.trust-certs=true
