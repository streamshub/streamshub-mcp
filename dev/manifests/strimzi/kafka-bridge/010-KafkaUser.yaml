---
# KafkaUser for bridge authentication to Kafka via TLS listener.
# Broad read/write access so the bridge can forward any client requests.
apiVersion: kafka.strimzi.io/v1
kind: KafkaUser
metadata:
  name: mcp-bridge-user
  namespace: strimzi-kafka
  labels:
    strimzi.io/cluster: mcp-cluster
    mcp: strimzi
    system: strimzi
spec:
  authentication:
    type: tls
  authorization:
    type: simple
    acls:
      - resource:
          type: topic
          name: mcp-bridge-
          patternType: prefix
        operations:
          - Read
          - Write
          - Describe
          - Create
      - resource:
          type: group
          name: mcp-bridge-
          patternType: prefix
        operations:
          - Read