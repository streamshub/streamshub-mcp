---
apiVersion: kafka.strimzi.io/v1
kind: KafkaMirrorMaker2
metadata:
  name: mcp-mirror-maker
  namespace: strimzi-kafka
  labels:
    mcp: strimzi
    system: strimzi
spec:
  version: 4.2.0
  replicas: 1
  target:
    alias: mcp-cluster
    bootstrapServers: mcp-cluster-kafka-bootstrap:9777
    tls:
      trustedCertificates:
        - secretName: mcp-cluster-cluster-ca-cert
          pattern: "*.crt"
    authentication:
      type: scram-sha-512
      username: mm2-user
      passwordSecret:
        secretName: mm2-user
        password: password
    groupId: mcp-mirror-maker
    configStorageTopic: mirrormaker2-cluster-configs
    statusStorageTopic: mirrormaker2-cluster-status
    offsetStorageTopic: mirrormaker2-cluster-offsets
  mirrors:
    - source:
        alias: mcp-cluster-secondary
        bootstrapServers: mcp-cluster-secondary-kafka-bootstrap:9092
      sourceConnector:
        tasksMax: 1
        config:
          replication.factor: 1
          offset-syncs.topic.replication.factor: 1
      checkpointConnector:
        tasksMax: 1
        config:
          checkpoints.topic.replication.factor: 1
          sync.group.offsets.enabled: true
      topicsPattern: ".*"
      topicsExcludePattern: "__.*"
      groupsPattern: ".*"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
