---
apiVersion: kafka.strimzi.io/v1
kind: KafkaUser
metadata:
  name: mm2-user
  namespace: strimzi-kafka
  labels:
    strimzi.io/cluster: mcp-cluster
    mcp: strimzi
    system: strimzi
spec:
  authentication:
    type: scram-sha-512
  authorization:
    type: simple
    acls:
      - resource:
          type: topic
          name: "*"
          patternType: literal
        operations:
          - All
        host: "*"
      - resource:
          type: group
          name: "*"
          patternType: literal
        operations:
          - All
        host: "*"
      - resource:
          type: cluster
        operations:
          - Alter
          - Describe
          - Create
        host: "*"
