---
# MinIO — lightweight S3-compatible storage for LokiStack in dev environments.
# NOT for production use. Replace with real S3/ODF/Azure storage in production.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-data
  namespace: openshift-logging
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: openshift-logging
  labels:
    app: minio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - name: minio
          image: quay.io/minio/minio:latest
          args:
            - server
            - /data
            - --console-address
            - ":9001"
          env:
            - name: MINIO_ROOT_USER
              value: minio
            - name: MINIO_ROOT_PASSWORD
              value: minio123
          ports:
            - name: s3
              containerPort: 9000
            - name: console
              containerPort: 9001
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: s3
            initialDelaySeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: minio-data
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: openshift-logging
  labels:
    app: minio
spec:
  selector:
    app: minio
  ports:
    - name: s3
      port: 9000
      targetPort: s3
    - name: console
      port: 9001
      targetPort: console
---
# Create the 'loki' bucket on startup
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-create-bucket
  namespace: openshift-logging
  labels:
    app: minio
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: quay.io/minio/mc:latest
          env:
            - name: HOME
              value: /tmp
          command:
            - /bin/sh
            - -c
            - |
              until mc alias set myminio http://minio.openshift-logging.svc:9000 minio minio123; do
                echo "Waiting for MinIO..."
                sleep 2
              done
              mc mb --ignore-existing myminio/loki
              echo "Bucket 'loki' ready"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
  backoffLimit: 10
