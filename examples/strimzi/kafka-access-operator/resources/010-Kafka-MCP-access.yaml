# The operator will look up the Kafka instance specified and
# create a secret with the details to connect to the listener specified.
# If no listener is specified it will choose one, preferring an internal listener.
---
apiVersion: access.strimzi.io/v1alpha1
kind: KafkaAccess
metadata:
  name: mcp-cluster-plain
spec:
  kafka:
    name: mcp-cluster
    namespace: strimzi-kafka
    listener: plain
---
apiVersion: access.strimzi.io/v1alpha1
kind: KafkaAccess
metadata:
  name: mcp-cluster-tls
spec:
  kafka:
    name: mcp-cluster
    namespace: strimzi-kafka
    listener: tls
---
apiVersion: access.strimzi.io/v1alpha1
kind: KafkaAccess
metadata:
  name: mcp-cluster-route
spec:
  kafka:
    name: mcp-cluster
    namespace: strimzi-kafka
    listener: route
---
apiVersion: access.strimzi.io/v1alpha1
kind: KafkaAccess
metadata:
  name: mcp-cluster-console
spec:
  kafka:
    name: mcp-cluster
    namespace: strimzi-kafka
    listener: console
