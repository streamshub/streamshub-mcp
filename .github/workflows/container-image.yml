name: Container Image

on:
  push:
    branches:
      - main
  pull_request:

env:
  REGISTRY: quay.io
  IMAGE_GROUP: streamshub

jobs:
  container-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Set up JDK 21
      uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Cache Maven packages
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Build container images (PR)
      if: github.event_name == 'pull_request'
      run: |
        ./mvnw package -DskipTests \
          -Dquarkus.container-image.build=true

    - name: Login to container registry
      if: github.event_name == 'push'
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ secrets.IMAGE_REPO_USERNAME }}
        password: ${{ secrets.IMAGE_REPO_PASSWORD }}

    - name: Build and push container images (main)
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        ./mvnw package -DskipTests \
          -Dquarkus.container-image.build=true \
          -Dquarkus.container-image.push=true \
          -Dquarkus.container-image.registry=${{ env.REGISTRY }} \
          -Dquarkus.container-image.group=${{ env.IMAGE_GROUP }} \
          -Dquarkus.container-image.tag=latest

    - name: Build and push Connect image (main)
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        ./mvnw package -pl systemtest -Pbuild-connect-image -DskipTests \
          -Dcontainer.engine=docker
