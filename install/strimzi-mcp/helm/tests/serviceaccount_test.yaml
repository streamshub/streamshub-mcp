suite: serviceaccount
templates:
  - serviceaccount.yaml
release:
  name: test
  namespace: streamshub-mcp
tests:
  - it: should render a ServiceAccount by default
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: test-streamshub-mcp-strimzi
      - equal:
          path: metadata.namespace
          value: streamshub-mcp

  - it: should not render when create is false
    set:
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should use custom name
    set:
      serviceAccount.name: my-custom-sa
    asserts:
      - equal:
          path: metadata.name
          value: my-custom-sa

  - it: should apply annotations
    set:
      serviceAccount.annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::role/mcp
    asserts:
      - isSubset:
          path: metadata.annotations
          content:
            eks.amazonaws.com/role-arn: arn:aws:iam::role/mcp

  - it: should not have annotations when empty
    asserts:
      - isNull:
          path: metadata.annotations
