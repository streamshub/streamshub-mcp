suite: podmonitor
templates:
  - podmonitor.yaml
release:
  name: test
  namespace: streamshub-mcp
tests:
  - it: should not render when disabled
    asserts:
      - hasDocuments:
          count: 0

  - it: should render when enabled
    set:
      podMonitor.enabled: true
    asserts:
      - isKind:
          of: PodMonitor
      - equal:
          path: metadata.name
          value: test-streamshub-mcp-strimzi
      - equal:
          path: metadata.namespace
          value: streamshub-mcp

  - it: should scrape /q/metrics on http port
    set:
      podMonitor.enabled: true
    asserts:
      - contains:
          path: spec.podMetricsEndpoints
          content:
            path: /q/metrics
            port: http

  - it: should use selector labels
    set:
      podMonitor.enabled: true
    asserts:
      - isSubset:
          path: spec.selector.matchLabels
          content:
            app.kubernetes.io/name: streamshub-mcp-strimzi
            app.kubernetes.io/instance: test

  - it: should add custom labels
    set:
      podMonitor.enabled: true
      podMonitor.labels:
        release: prometheus
    asserts:
      - equal:
          path: metadata.labels.release
          value: prometheus
