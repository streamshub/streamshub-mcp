suite: service
templates:
  - service.yaml
release:
  name: test
  namespace: streamshub-mcp
tests:
  - it: should render a ClusterIP Service
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: test-streamshub-mcp-strimzi
      - equal:
          path: metadata.namespace
          value: streamshub-mcp
      - equal:
          path: spec.type
          value: ClusterIP

  - it: should expose port 8080
    asserts:
      - contains:
          path: spec.ports
          content:
            name: http
            port: 8080
            targetPort: http
            protocol: TCP

  - it: should use selector labels
    asserts:
      - isSubset:
          path: spec.selector
          content:
            app.kubernetes.io/name: streamshub-mcp-strimzi
            app.kubernetes.io/instance: test

  - it: should allow port override
    set:
      service.port: 9090
    asserts:
      - contains:
          path: spec.ports
          content:
            name: http
            port: 9090
            targetPort: http
            protocol: TCP

  - it: should allow type override
    set:
      service.type: NodePort
    asserts:
      - equal:
          path: spec.type
          value: NodePort
