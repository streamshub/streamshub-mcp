suite: clusterrolebinding-loki
templates:
  - clusterrolebinding-loki.yaml
release:
  name: test
  namespace: streamshub-mcp
tests:
  - it: should not render when loki is disabled
    asserts:
      - hasDocuments:
          count: 0

  - it: should render when loki is enabled
    set:
      loki.enabled: true
    asserts:
      - isKind:
          of: ClusterRoleBinding
      - equal:
          path: metadata.name
          value: test-streamshub-mcp-strimzi-loki-application-view

  - it: should reference the Loki ClusterRole
    set:
      loki.enabled: true
    asserts:
      - equal:
          path: roleRef.kind
          value: ClusterRole
      - equal:
          path: roleRef.name
          value: test-streamshub-mcp-strimzi-loki-application-view

  - it: should bind to the ServiceAccount
    set:
      loki.enabled: true
    asserts:
      - contains:
          path: subjects
          content:
            kind: ServiceAccount
            name: test-streamshub-mcp-strimzi
            namespace: streamshub-mcp
