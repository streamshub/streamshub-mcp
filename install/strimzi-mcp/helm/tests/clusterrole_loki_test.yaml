suite: clusterrole-loki
templates:
  - clusterrole-loki.yaml
release:
  name: test
  namespace: streamshub-mcp
tests:
  - it: should not render when loki is disabled
    asserts:
      - hasDocuments:
          count: 0

  - it: should render when loki is enabled
    set:
      loki.enabled: true
    asserts:
      - isKind:
          of: ClusterRole
      - equal:
          path: metadata.name
          value: test-streamshub-mcp-strimzi-loki-application-view

  - it: should grant Loki application log access
    set:
      loki.enabled: true
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: ["loki.grafana.com"]
            resources: ["application"]
            resourceNames: ["logs"]
            verbs: ["get"]
