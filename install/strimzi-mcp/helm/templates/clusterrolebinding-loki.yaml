{{- if .Values.loki.enabled -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "strimzi-mcp.fullname" . }}-loki-application-view
  labels:
    {{- include "strimzi-mcp.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "strimzi-mcp.fullname" . }}-loki-application-view
subjects:
  - kind: ServiceAccount
    name: {{ include "strimzi-mcp.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
