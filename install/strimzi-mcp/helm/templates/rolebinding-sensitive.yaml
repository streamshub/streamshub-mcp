{{- range .Values.sensitive.namespaces }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "strimzi-mcp.fullname" $ }}-sensitive
  namespace: {{ . }}
  labels:
    {{- include "strimzi-mcp.labels" $ | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "strimzi-mcp.fullname" $ }}-sensitive
subjects:
  - kind: ServiceAccount
    name: {{ include "strimzi-mcp.serviceAccountName" $ }}
    namespace: {{ $.Release.Namespace }}
{{- end }}
