apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: streamshub-strimzi-mcp
  annotations:
    haproxy.router.openshift.io/timeout: 3600s
    haproxy.router.openshift.io/balance: source
spec:
  to:
    kind: Service
    name: streamshub-strimzi-mcp
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
